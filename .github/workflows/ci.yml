name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  static_scan:
    name: Static Source Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/static-scan.js

  backend:
    name: Backend
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ciphervote?schema=public
      JWT_SECRET: ci-access-secret-change-me
      JWT_REFRESH_SECRET: ci-refresh-secret-change-me
      VOTER_SECRET_PEPPER: ci-voter-secret-pepper
      PII_ENCRYPTION_KEY: ci-pii-encryption-key-change-me-32
      RPC_URL: http://127.0.0.1:8545
      CHAIN_ID: 31337
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npx prisma validate
      - run: npm test
      - name: Dependency audit report
        run: npm audit --audit-level=high
        continue-on-error: true

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Dependency audit report
        run: npm audit --audit-level=high
        continue-on-error: true

  blockchain:
    name: Blockchain
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blockchain
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: blockchain/package-lock.json
      - run: npm ci
      - run: npm run compile
      - run: npm run circuit:check
      - run: npm test
      - name: Dependency audit report
        run: npm audit --audit-level=high
        continue-on-error: true

  slither:
    name: Slither Static Analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blockchain
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: blockchain/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: npm ci
      - run: npm run compile
      - run: pip install slither-analyzer
      - name: Slither report
        run: slither . --filter-paths "node_modules|artifacts|cache"
        continue-on-error: true
